kind = "web"
previewPath = "/admin/"
title = "Haru88 Bot Admin"
version = "1.0.0"
id = "artifacts/haru88-admin"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/admin/" ]
localPort = 21450

[services.development]
run = "pnpm --filter @workspace/haru88-admin run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/haru88-admin", "run", "build" ]
publicDir = "artifacts/haru88-admin/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21450"
BASE_PATH = "/admin/"
